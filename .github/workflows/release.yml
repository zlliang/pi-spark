name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      paths:
        description: JSON array of package paths to publish
        required: true
        default: '["packages/pi-credits","packages/pi-spark"]'

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  prepare-publish:
    needs: release-please
    if: ${{ always() }}
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.prepare.outputs.should_publish }}
      paths: ${{ steps.prepare.outputs.paths }}
    steps:
      - id: prepare
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'should_publish=true' >> "$GITHUB_OUTPUT"
            echo 'paths=${{ inputs.paths }}' >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.release-please.outputs.releases_created }}" == "true" ]]; then
            echo 'should_publish=true' >> "$GITHUB_OUTPUT"
            echo 'paths=${{ needs.release-please.outputs.paths_released }}' >> "$GITHUB_OUTPUT"
          else
            echo 'should_publish=false' >> "$GITHUB_OUTPUT"
            echo 'paths=[]' >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: prepare-publish
    if: ${{ always() && needs.prepare-publish.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.prepare-publish.outputs.paths) }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: |
          cd "${{ matrix.path }}"
          pnpm publish --provenance --access public
